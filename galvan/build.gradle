plugins {
    id 'java-library'
    id 'maven-publish'
    id 'com.jfrog.artifactory'
}

description = 'terracotta-core galvan'

configurations {
    terracottaKit
}

dependencies {
    api project(":test-interfaces")
    api project(":server-api")
    implementation "org.terracotta:ipc-eventbus:1.1.4"
    api ("org.terracotta:terracotta-utilities-port-chooser:0.0.19") {
      exclude group: 'org.slf4j'
    }

    testImplementation "junit:junit:$junitVersion"
    testImplementation "org.mockito:mockito-core:$mockitoVersion"
    testImplementation "org.slf4j:slf4j-api:$slf4jVersion"
    
    terracottaKit project(":tc-server")
    terracottaKit project(":terracotta")
}

def galvanKit = tasks.register('galvanServerZip', Zip) {
    destinationDirectory = layout.buildDirectory.dir('galvan-kit')
    archiveFileName = "galvan-test-server.zip"
    into("server") {
        from(configurations.terracottaKit)
    }
}

def generateChecksum = tasks.register('generateGalvanChecksum') {
    def inputFile = galvanKit.flatMap { it.archiveFile}
    def checksumDir = layout.buildDirectory.dir("galvan-checksums")

    inputs.file(inputFile).withPathSensitivity(PathSensitivity.NONE)
    outputs.dir(checksumDir)
    
    doLast {
        def zipFile = inputFile.get().asFile
        def checksumFile = checksumDir.get().file("${zipFile.name}.sha256").asFile
        def checksum = java.security.MessageDigest.getInstance('SHA-256')

        zipFile.eachByte(8192) { byte[] buffer, int length ->
            checksum.update(buffer, 0, length)
        }

        checksumFile.withWriter {
            checksum.digest().encodeHex().writeTo(it)
        }
    }
}

sourceSets.main {
    output.dir(galvanKit.map { it.destinationDirectory })
    output.dir(generateChecksum)
}

// Exclude empty.txt from copyright checks
sourceSets.main.copyright.exclude '**/empty.txt'

tasks.named('test', Test) {
    systemProperty "kitInstallPath", layout.buildDirectory.dir("galvan-default").get().toString()
}

publishing {
    publications {
        runtime(MavenPublication) {
            groupId = 'org.terracotta'
            version = "$project.version"
            artifactId = "$project.name"
            from components.java
        }
    }
}
